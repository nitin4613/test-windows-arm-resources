version: 2.1

executors:
  win-arm-large:
    machine:
      image: windows-11-arm:current
    resource_class: windows.arm.large

workflows:
  test-persist-to-workspace:
    jobs:
      - persist-small-file
      - persist-postman-app
      - verify-small-file:
          requires:
            - persist-small-file
      - verify-postman-app:
          requires:
            - persist-postman-app

jobs:
  persist-small-file:
    executor: win-arm-large
    shell: bash.exe
    steps:
      - run:
          name: Create test files
          command: |
            set -e
            mkdir -p app
            echo "hello from windows arm" > app/test.txt
            dd if=/dev/urandom of=app/100mb.bin bs=1M count=100 2>/dev/null || true
            echo "Contents of app/:"
            ls -lah app/
      - persist_to_workspace:
          root: .
          paths:
            - app

  persist-postman-app:
    executor: win-arm-large
    shell: bash.exe
    steps:
      - run:
          name: Download Postman Desktop app
          command: |
            set -e
            mkdir -p app

            echo "Starting download of PostmanStage-win64-Setup.exe..."
            curl -L -o app/PostmanStage-win64-Setup.exe https://dl-stage.pstmn.io/download/latest/win64

            echo "Download complete. Contents of app/:"
            ls -lah app/
          no_output_timeout: 20m
      - run:
          name: Verify download integrity
          command: |
            set -e
            FILE="app/PostmanStage-win64-Setup.exe"
            SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || wc -c < "$FILE")
            echo "File size: $SIZE bytes"
            if [ "$SIZE" -lt 1000000 ]; then
              echo "ERROR: File too small, download likely failed"
              exit 1
            fi
            echo "File size looks valid"
      - run:
          name: Record timestamp before persist
          command: |
            echo "Starting persist_to_workspace at: $(date '+%Y-%m-%d %H:%M:%S')"
      - persist_to_workspace:
          root: .
          paths:
            - app

  verify-small-file:
    executor: win-arm-large
    shell: bash.exe
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Verify small file workspace attachment
          command: |
            set -e
            echo "Contents of app/:"
            ls -lah app/

            if [ -f app/test.txt ]; then
              echo "PASS: test.txt found"
              cat app/test.txt
            else
              echo "FAIL: test.txt not found"
              exit 1
            fi

            if [ -f app/100mb.bin ]; then
              echo "PASS: 100mb.bin found"
            else
              echo "FAIL: 100mb.bin not found"
              exit 1
            fi

            echo "All workspace verifications passed!"

  verify-postman-app:
    executor: win-arm-large
    shell: bash.exe
    steps:
      - attach_workspace:
          at: .
      - run:
          name: Verify Postman app workspace attachment
          command: |
            set -e
            echo "Contents of app/:"
            ls -lah app/

            FILE="app/PostmanStage-win64-Setup.exe"
            if [ -f "$FILE" ]; then
              SIZE=$(stat -c%s "$FILE" 2>/dev/null || stat -f%z "$FILE" 2>/dev/null || wc -c < "$FILE")
              echo "PASS: PostmanStage-win64-Setup.exe found, size: $SIZE bytes"
            else
              echo "FAIL: PostmanStage-win64-Setup.exe not found in workspace"
              exit 1
            fi

            echo "Postman app workspace verification passed!"
